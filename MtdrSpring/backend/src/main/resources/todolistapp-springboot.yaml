apiVersion: v1
kind: Service
metadata:
  name: todolistapp-springboot-service
  annotations:
    oci.oraclecloud.com/loadbalancer-policy: "IP_HASH"
spec:
  type: LoadBalancer
  externalTrafficPolicy: Local
  ports:
    - port: 80
      protocol: TCP
      targetPort: 8080
  selector:
    app: todolistapp-springboot
---
#this is new stuff for hosting on the load balancer
apiVersion: v1
kind: Service
metadata:
  name: todolistapp-backend-router
spec:
  selector:
    app: todolistapp-springboot
  ports:
    - protocol: TCP
      port: 80
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: todolistapp-springboot-deployment
spec:
  selector:
    matchLabels:
      app: todolistapp-springboot
  replicas: 2
  template:
    metadata:
      labels:
        app: todolistapp-springboot
        version: v1
    spec:
      containers:
        - name: todolistapp-springboot
          image: mx-queretaro-1.ocir.io/axij8uqyfn7v/reacttodo/p0r1y
          imagePullPolicy: Always
          env:
            # ── Database ──────────────────────────────────────────────
            - name: db_user
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: db-user
            - name: db_url
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: db-url
            - name: db_password
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: db-password
            - name: todo.table.name
              value: "todoitem"
            - name: driver_class_name
              value: "oracle.jdbc.OracleDriver"
            - name: OCI_REGION
              value: "%OCI_REGION%"

            # ── Frontend auth ─────────────────────────────────────────
            - name: ui_username
              value: "%UI_USERNAME%"
            - name: ui_password
              valueFrom:
                secretKeyRef:
                  name: frontendadmin
                  key: password
                  optional: true

            # ── Gemini API ────────────────────────────────────────────
            - name: gemini.api.key
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: gemini-api-key
            - name: gemini.api.model
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: gemini-api-model
            - name: gemini.api.url
              valueFrom:
                secretKeyRef:
                 name: app-secrets
                 key: gemini-api-url
            - name: gemini.max-output-tokens
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: gemini-max-output-tokens
            - name: gemini.temperature
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: gemini-temperature

            # ── Deepseek API ──────────────────────────────────────────
            - name: deepseek.api.key
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: deepseek-api-key
            - name: deepseek.api.url
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: deepseek-api-url

            # ── Telegram Bot ──────────────────────────────────────────
            - name: telegram.bot.token
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: telegram-bot-token
            - name: telegram.bot.name
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: telegram-bot-name

            # ── Email / SMTP ──────────────────────────────────────────
            - name: spring.mail.host
              value: "smtp.gmail.com"
            - name: spring.mail.port
              value: "587"
            - name: spring.mail.username
              value: "synkrateam21@gmail.com"
            - name: spring.mail.password
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: mail-password
            - name: spring.mail.properties.mail.smtp.auth
              value: "true"
            - name: spring.mail.properties.mail.smtp.starttls.enable
              value: "true"

            # ── Telegram Bot task defaults ────────────────────────────
            - name: bot.task.defaultProjectId
              value: "1"
            - name: bot.task.defaultDeveloperId
              value: "1"
            - name: bot.task.defaultTaskType
              value: "new-feature"
            - name: bot.task.defaultPriority
              value: "MEDIUM"
            - name: bot.task.defaultEstimatedTime
              value: "1"
            - name: bot.task.defaultDeadlineDays
              value: "7"

            # ── Oracle Vector ─────────────────────────────────────────
            - name: oracle.vector.embedding-model
              value: "ALL_MINILM_L12_V2"

          volumeMounts:
            - name: creds
              mountPath: /mtdrworkshop/creds
          ports:
            - containerPort: 8080
      restartPolicy: Always
      volumes:
        - name: creds
          secret:
            secretName: db-wallet-secret
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: todolistapp-springboot
---
